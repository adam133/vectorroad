name: Request Final Human Review

# After the Copilot coding agent has pushed fixes to address review comments,
# automatically request a final review from adam133.
#
# This workflow triggers whenever new commits are pushed to an open pull request
# (synchronize event) and checks whether the most-recent commit was authored by
# the Copilot agent. If so, it means Copilot has finished addressing comments
# and it is time for the human reviewer to take over.
on:
  pull_request:
    types: [synchronize]

jobs:
  request-human-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check whether the latest commit was pushed by the Copilot agent
        id: check-copilot-commit
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;

            // Fetch the commits on this PR and inspect the most recent one.
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const latest = commits[commits.length - 1];
            const authorName  = (latest.commit.author?.name  || '').toLowerCase();
            const authorEmail = (latest.commit.author?.email || '').toLowerCase();
            const committerName  = (latest.commit.committer?.name  || '').toLowerCase();
            const committerEmail = (latest.commit.committer?.email || '').toLowerCase();

            const isCopilot =
              authorName.includes('copilot')  ||
              authorEmail.includes('copilot') ||
              committerName.includes('copilot')  ||
              committerEmail.includes('copilot');

            console.log(`Latest commit – author: "${authorName}" <${authorEmail}>, committer: "${committerName}" <${committerEmail}>`);
            console.log(`isCopilotCommit: ${isCopilot}`);
            return isCopilot;

      - name: Request review from adam133
        if: steps.check-copilot-commit.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            console.log(`Copilot has pushed fixes to PR #${prNumber}. Requesting final review from adam133.`);

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: ['adam133'],
              });
              console.log('Review requested from adam133.');
            } catch (error) {
              core.warning(`Could not request review from adam133: ${error.message}`);
            }
