name: Unity Tests

# Runs Unity's built-in Test Framework (edit-mode and play-mode) using GameCI.
#
# Required repository secrets
# ────────────────────────────
#   UNITY_LICENSE   – contents of a valid Unity .ulf license file
#   UNITY_EMAIL     – Unity account e-mail
#   UNITY_PASSWORD  – Unity account password

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  unity-tests:
    name: Unity Tests (${{ matrix.testMode }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - editMode
          - playMode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.testMode }}-
            Library-

      - name: Run Unity tests (${{ matrix.testMode }})
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: ${{ matrix.testMode }}
          artifactsPath: TestResults/${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Unity Test Results (${{ matrix.testMode }})

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-test-results-${{ matrix.testMode }}
          path: ${{ steps.tests.outputs.artifactsPath }}
          if-no-files-found: warn
          retention-days: 14
