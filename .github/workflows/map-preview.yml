name: Map Preview

on:
  pull_request:
    branches: [ main ]

jobs:
  map-preview:
    name: Render and post map preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests pytest

      - name: Run osm_downloader tests
        run: pytest Tools/test_osm_downloader.py -v

      - name: Download OSM map data (downtown Des Moines, IA)
        run: >
          python Tools/osm_downloader.py
          --lat 41.587881
          --lon -93.620142
          --radius 5000
          --output Assets/Data/map.osm.xml

      - name: Restore dependencies
        run: dotnet restore Tests/TerraDrive.Tests/TerraDrive.Tests.csproj

      - name: Build
        run: dotnet build Tests/TerraDrive.Tests/TerraDrive.Tests.csproj --no-restore

      - name: Generate map preview and chase-cam preview
        run: >
          dotnet test Tests/TerraDrive.Tests/TerraDrive.Tests.csproj
          --no-build
          --verbosity normal
          --filter "Category=Integration"
        env:
          MAP_PREVIEW_DIR: ${{ github.workspace }}
          CHASE_CAM_PREVIEW_DIR: ${{ github.workspace }}

      - name: Upload map preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-preview
          path: ${{ github.workspace }}/map-preview.png
          if-no-files-found: error
          retention-days: 30

      - name: Upload chase-cam preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: chase-cam-preview
          path: ${{ github.workspace }}/chase-cam-preview.png
          if-no-files-found: error
          retention-days: 30

      - name: Post map preview comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🗺️ Map Preview',
                '',
                'A top-down preview of `Assets/Data/map.osm.xml` has been rendered by the integration test.',
                '',
                `📦 **[Download \`map-preview.png\` from the workflow artifacts](${runUrl})**`,
                '',
                '> Roads are colour-coded by highway type (motorway → red, primary → orange, residential → white).',
                '> Buildings are shown as filled grey polygons.',
                '',
                '## 🎮 Chase-Cam Preview',
                '',
                'A perspective screenshot from the chase camera at a static position at the map centre.',
                'The red rectangle marks the car. The camera is 8 m behind and 3 m above, matching the',
                '`ChaseCam` controller defaults.',
                '',
                `📦 **[Download \`chase-cam-preview.png\` from the workflow artifacts](${runUrl})**`,
                '',
                `_Generated by workflow run [#${context.runId}](${runUrl})_`,
              ].join('\n'),
            });
