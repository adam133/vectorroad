name: Map Preview

on:
  pull_request:
    branches: [ main ]

jobs:
  map-preview:
    name: Render and post map preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download OSM map data (downtown Des Moines, IA)
        run: >
          dotnet run --project Tools/OsmDownloader
          --
          --lat 41.587881
          --lon -93.620142
          --radius 5000
          --output ${{ github.workspace }}/map_api_download.osm.xml

      - name: Restore dependencies
        run: dotnet restore Tests/TerraDrive.Tests/TerraDrive.Tests.csproj

      - name: Build
        run: dotnet build Tests/TerraDrive.Tests/TerraDrive.Tests.csproj --no-restore

      - name: Generate map preview and chase-cam preview
        run: >
          dotnet test Tests/TerraDrive.Tests/TerraDrive.Tests.csproj
          --no-build
          --verbosity normal
          --filter "Category=Integration"
        env:
          MAP_PREVIEW_DIR: ${{ github.workspace }}
          CHASE_CAM_PREVIEW_DIR: ${{ github.workspace }}
          OSM_MAP_PATH: ${{ github.workspace }}/map_api_download.osm.xml

      - name: Upload map preview artifact
        id: upload-map-preview
        uses: actions/upload-artifact@v4
        with:
          name: map-preview
          path: ${{ github.workspace }}/map-preview.png
          if-no-files-found: error
          retention-days: 30

      - name: Upload chase-cam preview artifact
        id: upload-chase-cam-preview
        uses: actions/upload-artifact@v4
        with:
          name: chase-cam-preview
          path: ${{ github.workspace }}/chase-cam-preview.png
          if-no-files-found: error
          retention-days: 30

      - name: Post map preview comment on PR
        uses: actions/github-script@v7
        env:
          MAP_PREVIEW_URL: ${{ steps.upload-map-preview.outputs.artifact-url }}
          CHASE_CAM_PREVIEW_URL: ${{ steps.upload-chase-cam-preview.outputs.artifact-url }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const mapPreviewUrl = process.env.MAP_PREVIEW_URL;
            const chaseCamPreviewUrl = process.env.CHASE_CAM_PREVIEW_URL;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🗺️ Map Preview',
                '',
                'A top-down preview rendered from live OpenStreetMap data downloaded via the Overpass API',
                '(downtown Des Moines, IA — 41.587881, -93.620142) has been generated by the integration test.',
                '',
                `📦 **[Download \`map-preview.png\`](${mapPreviewUrl})**`,
                '',
                '> Roads are colour-coded by highway type (motorway → red, primary → orange, residential → white).',
                '> Buildings are shown as filled grey polygons.',
                '',
                '## 🎮 Chase-Cam Preview',
                '',
                'A perspective screenshot from the chase camera at a static position at the map centre.',
                'The red rectangle marks the car. The camera is 8 m behind and 3 m above, matching the',
                '`ChaseCam` controller defaults.',
                '',
                `📦 **[Download \`chase-cam-preview.png\`](${chaseCamPreviewUrl})**`,
                '',
                `_Generated by workflow run [#${context.runId}](${runUrl})_`,
              ].join('\n'),
            });
