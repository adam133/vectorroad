name: Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    name: Run unit tests (.NET)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore Tests/TerraDrive.Tests/TerraDrive.Tests.csproj

      - name: Build
        run: dotnet build Tests/TerraDrive.Tests/TerraDrive.Tests.csproj --no-restore

      - name: Run tests
        run: dotnet test Tests/TerraDrive.Tests/TerraDrive.Tests.csproj --no-build --verbosity normal

  python-tools-tests:
    name: Run osm_downloader tests (Python)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pytest

      - name: Run osm_downloader tests
        run: pytest Tools/test_osm_downloader.py -v -m "not integration"
