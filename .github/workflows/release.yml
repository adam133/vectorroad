name: Release Build

# Triggered when a commit is pushed to the "release" branch.
# Builds the Unity project for all three desktop platforms, packages the
# binaries as release assets, and publishes a tagged GitHub Release.
#
# Required repository secrets
# ────────────────────────────
#   UNITY_LICENSE   – contents of a valid Unity .ulf license file
#   UNITY_EMAIL     – Unity account e-mail
#   UNITY_PASSWORD  – Unity account password
#
# The build version is derived from the repository tag pushed alongside the
# commit, or falls back to YYYY.MM.DD-<short SHA> if no tag is present.

on:
  push:
    branches: [ "release" ]

jobs:
  # ── 1. Derive the release version ─────────────────────────────────────────
  version:
    name: Determine version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version string
        id: version
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]' | head -n1)
          if [ -n "$TAG" ]; then
            VERSION="${TAG#v}"
          else
            VERSION="$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  # ── 2. Run unit tests ─────────────────────────────────────────────────────
  test:
    name: Run unit tests (.NET)
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore Tests/VectorRoad.Tests/VectorRoad.Tests.csproj

      - name: Build
        run: dotnet build Tests/VectorRoad.Tests/VectorRoad.Tests.csproj --no-restore

      - name: Run tests
        run: dotnet test Tests/VectorRoad.Tests/VectorRoad.Tests.csproj --no-build --verbosity normal

  # ── 3. Build Unity project for each target platform ───────────────────────
  build:
    name: Build (${{ matrix.targetPlatform }})
    runs-on: ubuntu-latest
    needs: [ version, test ]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - StandaloneOSX
          - StandaloneLinux64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Configure project (set gravity and layers)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          buildMethod: VectorRoad.Editor.ProjectSetup.Configure
          allowDirtyBuild: true

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: VectorRoad
          versioning: Custom
          version: ${{ needs.version.outputs.version }}

      - name: Archive build output
        run: |
          cd build/${{ matrix.targetPlatform }}
          zip -r "../../VectorRoad-${{ needs.version.outputs.version }}-${{ matrix.targetPlatform }}.zip" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VectorRoad-${{ needs.version.outputs.version }}-${{ matrix.targetPlatform }}
          path: VectorRoad-${{ needs.version.outputs.version }}-${{ matrix.targetPlatform }}.zip
          if-no-files-found: error
          retention-days: 90

  # ── 4. Publish GitHub Release ─────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [ version, build ]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: VectorRoad v${{ needs.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**/*.zip
