name: Request Copilot Code Review

# Automatically request a Copilot code review whenever a pull request
# becomes ready for review (either opened as non-draft or converted from draft).
on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  request-copilot-review:
    runs-on: ubuntu-latest
    # Only run for non-draft pull requests
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot code review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            console.log(`Requesting Copilot review for PR #${prNumber}`);

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: ['copilot-pull-request-reviewer[bot]'],
              });
              console.log('Copilot review requested successfully.');
            } catch (error) {
              // Copilot review may not be enabled or the bot handle may differ;
              // log the error without failing the workflow so it doesn't block the PR.
              core.warning(`Could not request Copilot review: ${error.message}`);
            }
